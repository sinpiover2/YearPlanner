<!doctype html>
<html>
  <head>
    <base target="_top">
    <style>
      :root {
        color: #111111;
        font-family: Arial, Helvetica, sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: #f3f5f8;
      }

      .toolbar {
        display: flex;
        justify-content: flex-end;
        width: min(100% - 32px, 900px);
        margin: 20px auto 10px;
      }

      button {
        min-height: 36px;
        padding: 7px 16px;
        border: 1px solid #cbd3df;
        border-radius: 18px;
        background: #ffffff;
        color: inherit;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }

      button:hover {
        background: #f8fafc;
      }

      .print-sheet {
        width: min(100% - 32px, 900px);
        margin: 0 auto 32px;
        padding: 36px;
        background: #ffffff;
        box-shadow: 0 8px 30px rgba(23, 32, 51, 0.1);
      }

      .print-page + .print-page {
        margin-top: 24px;
      }

      .error-banner {
        padding: 24px;
        border: 1px solid #d7263d;
        background: #fdeeef;
        color: #7a1424;
        border-radius: 8px;
      }

      .error-banner h1 {
        margin: 0 0 6px;
        font-size: 16px;
      }

      .error-banner p {
        margin: 0;
        font-size: 13px;
      }

      /* Page 1: lesson plan. Mirrors the frontend's
         .lesson-session-static-print-* rules (frontend/src/App.css) as
         closely as an Apps Script HTML template can. */

      .lesson-print-header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 16pt;
        margin-bottom: 7pt;
        padding-bottom: 6pt;
        border-bottom: 0.6pt solid #a4a8ae;
      }

      .lesson-print-header h1 {
        margin: 0;
        color: #111111;
        font-size: 19pt;
        font-weight: 800;
        letter-spacing: 0.01em;
        text-transform: uppercase;
      }

      .lesson-print-header p,
      .lesson-print-context {
        margin: 2pt 0 0;
        color: #6b7280;
        font-size: 9pt;
        font-weight: 600;
      }

      .lesson-print-header > p {
        text-align: right;
        white-space: nowrap;
      }

      .lesson-print-context {
        margin-bottom: 12pt;
      }

      .lesson-print-episode {
        break-inside: avoid;
        margin: 0 0 14pt;
        padding: 0 0 0 17pt;
      }

      .lesson-print-episode + .lesson-print-episode {
        padding-top: 10pt;
        border-top: 0.5pt solid #b6bac0;
      }

      .lesson-print-episode h2 {
        position: relative;
        margin: 0;
        color: #111111;
        font-size: 12pt;
        font-weight: 650;
        line-height: 1.3;
      }

      .lesson-print-episode h2::before {
        content: "";
        position: absolute;
        top: 2pt;
        left: -17pt;
        box-sizing: border-box;
        width: 9pt;
        height: 9pt;
        border: 1px solid #9ca3af;
      }

      .lesson-deliverable-badge {
        margin-left: 6pt;
        padding: 1pt 6pt;
        border: 1px solid #9ca3af;
        border-radius: 999px;
        font-size: 7.5pt;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        vertical-align: middle;
      }

      .lesson-print-curriculum {
        margin: 3pt 0 0;
        color: #4b5563;
        font-size: 8.5pt;
        font-style: italic;
        font-weight: 600;
      }

      .lesson-print-episode ul {
        display: grid;
        gap: 2pt;
        margin: 4pt 0 0;
        padding: 0;
        list-style: none;
      }

      .lesson-print-episode li {
        display: grid;
        grid-template-columns: 11pt 1fr;
        gap: 5pt;
        color: #4b5563;
        font-size: 8.5pt;
        font-style: italic;
        line-height: 1.35;
      }

      .lesson-print-episode li > span:first-child {
        color: #9ca3af;
      }

      /* Page 2: roster. */

      <?!= include_('RosterStyles'); ?>

      @media print {
        @page {
          size: letter portrait;
          margin: 0.4in 0.55in 0.55in;
        }

        body {
          background: #ffffff;
        }

        .toolbar {
          display: none;
        }

        .print-sheet {
          width: 100%;
          margin: 0;
          padding: 0;
          box-shadow: none;
        }

        .print-page + .print-page {
          margin-top: 0;
        }

        .print-page-roster,
        .print-page-break {
          break-before: page;
          page-break-before: always;
        }
      }
    </style>
  </head>
  <body>
    <div class="toolbar">
      <? if (entries.some(function (entry) { return !entry.errorMessage; })) { ?>
        <button type="button" onclick="window.print()">Print</button>
      <? } ?>
    </div>

    <div class="print-sheet">
      <? entries.forEach(function (entry, entryIndex) { ?>
        <? var breakClass = entryIndex > 0 ? " print-page-break" : ""; ?>
        <? if (entry.errorMessage) { ?>
          <section class="error-banner<?= breakClass ?>">
            <h1>This print request could not be completed</h1>
            <p><?= entry.errorMessage ?></p>
          </section>
        <? } else { ?>
          <section class="print-page print-page-lesson<?= breakClass ?>">
            <header class="lesson-print-header">
              <div>
                <h1><?= entry.lesson.sectionLabel || "Lesson Session" ?></h1>
                <? if (entry.lesson.courseLabel || entry.lesson.unitLabel) { ?>
                  <p><?= [entry.lesson.courseLabel, entry.lesson.unitLabel].filter(Boolean).join(" · ") ?></p>
                <? } ?>
              </div>
              <p><?= entry.formattedSessionDate ?></p>
            </header>

            <? if (entry.lesson.connectedLessons && entry.lesson.connectedLessons.length) { ?>
              <p class="lesson-print-context">Curriculum · <?= entry.lesson.connectedLessons.join(" · ") ?></p>
            <? } ?>

            <? entry.lesson.episodes.forEach(function (episode) { ?>
              <article class="lesson-print-episode">
                <h2>
                  <?= episode.title ?>
                  <? if (episode.isDeliverable) { ?>
                    <span class="lesson-deliverable-badge">Deliverable</span>
                  <? } ?>
                </h2>

                <? if (episode.curriculumLabel) { ?>
                  <p class="lesson-print-curriculum">Curriculum · <?= episode.curriculumLabel ?></p>
                <? } ?>

                <? if (episode.blocks.length) { ?>
                  <ul>
                    <? episode.blocks.forEach(function (block) { ?>
                      <li>
                        <span aria-hidden="true"><?= block.type === "learning" ? "◎" : block.type === "deliverable" ? "▢" : block.type === "materials" ? "◇" : "•" ?></span>
                        <span><?= block.text ?></span>
                      </li>
                    <? }); ?>
                  </ul>
                <? } ?>
              </article>
            <? }); ?>
          </section>

          <section class="print-page print-page-roster">
            <?!= include_('RosterSection', {
              roster: entry.roster,
              sessionDate: entry.sessionDate,
              formattedSessionDate: entry.formattedSessionDate,
            }); ?>
          </section>
        <? } ?>
      <? }); ?>
    </div>
  </body>
</html>
